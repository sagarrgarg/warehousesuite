<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>POW - WarehouseSuite</title>
  <meta name="description" content="Point of Work - Mobile-first warehouse management">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes">
  <script type="module" crossorigin src="/assets/warehousesuite/pow/assets/index-IO_r4a64.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/warehousesuite/pow/assets/index-1eKQdnV6.css">
</head>
<body>
  <div id="root"></div>
  <script type="application/json" id="pow-boot-data">{{ boot | json }}</script>
  <script>
    window.frappe = window.frappe || {};
  </script>
  <!-- csrf_token -->
  <script>
    (function () {
      try {
        var el = document.getElementById('pow-boot-data');
        var raw = el && el.textContent ? el.textContent.trim() : '';
        if (raw) {
          frappe.boot = JSON.parse(raw);
        }
      } catch (_e) {
        /* Invalid JSON (e.g. dev placeholder) — main.tsx loads boot via get_context_for_dev */
      }
      if (typeof frappe !== 'undefined' && frappe.csrf_token) {
        window.csrf_token = frappe.csrf_token;
      }
    })();
  </script>
</body>
</html>
